 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Usuario - CundiPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Bienvenido a CundiPark</h1>
        <p class="text-center">Sesión iniciada como: <strong th:text="${user.nombre}"></strong></p>

        <!-- Mi Vehículo Actual -->
        <div class="card p-3">
            <h3>Mi Vehículo Actual</h3>
            <div th:if="${vehiculoActual != null}">
                <p><strong>Placa:</strong> <span class="fw-bold" th:text="${vehiculoActual.placa}"></span></p>
                <p><strong>Bloque:</strong> <span class="fw-bold" th:text="${vehiculoActual.bloque.nombre}"></span></p>
                <p><strong>Hora de Entrada:</strong> <span class="fw-bold" th:text="${#temporals.format(vehiculoActual.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
                <form th:action="@{'/salida/' + ${vehiculoActual.id}}" method="post">
                    <button type="submit" class="btn btn-warning">Registrar Salida</button>
                </form>
            </div>
            <div th:unless="${vehiculoActual != null}">
                <p>No tienes un vehículo registrado actualmente.</p>
                <!-- Formulario para registrar entrada -->
                <form th:action="@{/entrada}" method="post" class="mt-3">
                    <div class="mb-3">
                        <label for="placa" class="form-label">Placa del Vehículo</label>
                        <input type="text" class="form-control" id="placa" name="placa" placeholder="ABC-123" required>
                    </div>
                    <div class="mb-3">
                        <label for="bloqueId" class="form-label">Seleccionar Bloque</label>
                        <select class="form-select" id="bloqueId" name="bloqueId">
                            <option value="" disabled selected>Selecciona zona...</option>
                            <option th:each="bloque : ${bloques}" th:if="${bloque.disponibles > 0}" th:value="${bloque.id}" th:text="${bloque.nombre + ' (' + bloque.disponibles + ' disponibles)'}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Registrar Entrada</button>
                </form>
            </div>
        </div>

        <!-- Mapa de Bloques (Simulado con Tarjetas) -->
        <h3>Disponibilidad de Bloques</h3>
        <div class="row">
            <div class="col-md-4" th:each="bloque : ${bloques}">
                <div class="card p-3 text-white" th:classappend="${bloque.disponibles > 5 ? 'bg-success' : (bloque.disponibles > 0 ? 'bg-warning' : 'bg-danger')}">
                    <h5 th:text="${bloque.nombre}"></h5>
                    <p>Disponibles: <span th:text="${bloque.disponibles}"></span> / <span th:text="${bloque.capacidad}"></span></p>
                </div>
            </div>
        </div>

        <!-- Historial (Últimas 5) -->
        <div class="card p-3">
            <h3>Mi Historial Reciente</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Bloque</th>
                        <th>Entrada</th>
                        <th>Salida</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="registro : ${historial}">
                        <td th:text="${registro.placa}"></td>
                        <td th:text="${registro.bloque?.nombre}"></td>
                        <td th:text="${#temporals.format(registro.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${registro.fechaSalida != null ? #temporals.format(registro.fechaSalida, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <a href="/logout" class="btn btn-danger">Salir</a>
        </div>
    </div>
</body>

</html>
