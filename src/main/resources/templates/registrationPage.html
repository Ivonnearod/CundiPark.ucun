<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: header-css}"></div>
    <title>Registro - CundiPark</title>
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, var(--light-blue) 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .register-card {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            overflow: hidden;
            background: white;
        }
        .register-header {
            background: linear-gradient(45deg, var(--primary-blue), var(--dark-blue));
            color: white;
            padding: 2.5rem;
            text-align: center;
        }
        .register-logo { height: 70px; margin-bottom: 1rem; filter: brightness(0) invert(1); }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem var(--shadow);
            border-color: var(--primary-blue);
        }
        .btn-register {
            background-color: var(--primary-blue);
            border: none;
            font-weight: 600;
            padding: 12px;
        }
        .btn-register:hover {
            background-color: var(--dark-blue);
            transform: translateY(-2px);
        }
        .section-title {
            border-left: 4px solid var(--primary-blue);
            padding-left: 10px;
            margin: 1.5rem 0 1rem 0;
        }
        .text-danger {
            font-size: 0.875em;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <img th:src="@{/images/LOGO CUNDIPARK.png}" alt="Logo" class="register-logo" onerror="this.style.display='none'">
            <h2 class="fw-bold mb-0">Crear Cuenta</h2>
            <p class="mb-0 mt-2 opacity-75">Únete a CundiPark</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <form th:action="@{/registration}" th:object="${user}" method="post">
                
                <!-- Mostrar errores globales si los hay -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>

                <h5 class="section-title text-primary fw-bold">1. Datos Personales</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nombre" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required placeholder="Ej: Juan Pérez">
                        <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefono" class="form-label">Teléfono de Contacto</label>
                        <input type="tel" class="form-control" th:field="*{telefono}" required placeholder="Ej: 3101234567">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" th:field="*{email}" required placeholder="usuario@udec.edu.co">
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <h5 class="section-title text-primary fw-bold">2. Vinculación Institucional</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="tipoVinculacion" class="form-label">Tipo de Usuario</label>
                        <select class="form-select" th:field="*{tipoVinculacion}" required>
                            <option value="">Seleccione...</option>
                            <option value="Estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Visitante">Visitante</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="programa" class="form-label">Programa / Facultad / Dependencia</label>
                        <input type="text" class="form-control" th:field="*{programa}" placeholder="Ej: Ingeniería de Sistemas">
                    </div>
                </div>

                <h5 class="section-title text-primary fw-bold">3. Información del Vehículo</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="soatVencimiento" class="form-label"><i class="fas fa-file-medical me-1"></i>Vencimiento SOAT</label>
                        <input type="date" class="form-control" th:field="*{soatVencimiento}" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="tecnoVencimiento" class="form-label"><i class="fas fa-tools me-1"></i>Vencimiento Técnico-Mecánica</label>
                        <input type="date" class="form-control" th:field="*{tecnoVencimiento}" required>
                    </div>
                </div>

                <h5 class="section-title text-primary fw-bold">4. Seguridad de la Cuenta</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control form-control-lg" th:field="*{password}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="passwordConfirmation" class="form-label">Confirmar Contraseña</label>
                        <input type="password" class="form-control form-control-lg" th:field="*{passwordConfirmation}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('passwordConfirmation')}" th:errors="*{passwordConfirmation}"></div>
                    </div>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg btn-register text-white">Registrarme</button>
                </div>
            </form>
            <hr class="my-4">
            <div class="text-center">
                <p>¿Ya tienes una cuenta? <a th:href="@{/login}" class="fw-bold text-decoration-none" style="color: var(--primary-blue);">Inicia sesión</a></p>
            </div>
        </div>
    </div>
    <div th:replace="~{layout :: footer-scripts}"></div>
</body>
</html>
