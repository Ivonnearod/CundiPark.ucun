<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Principal - CundiPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Bienvenido a CundiPark</h1>
        <p class="text-center">Sesión iniciada como: <strong th:text="${user}"></strong></p>

        <div th:if="${mensaje}" class="alert alert-success" role="alert" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Zonas Disponibles</h3>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="seccion : ${secciones}" th:text="${seccion.nombre}"></li>
                    </ul>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Consulta de Vehículo</h3>
                    <form th:action="@{/consulta}" method="get">
                        <div class="mb-3">
                            <label for="placa" class="form-label">Placa</label>
                            <input type="text" class="form-control" id="placa" name="placa" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </form>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Ingreso de Vehículo</h3>
                    <form th:action="@{/ingreso}" method="post">
                        <div class="mb-3">
                            <label for="placaIngreso" class="form-label">Placa</label>
                            <input type="text" class="form-control" id="placaIngreso" name="placa" required>
                        </div>
                        <div class="mb-3">
                            <label for="bloque" class="form-label">Bloque</label>
                            <select class="form-control" id="bloque" name="bloqueId" required>
                                <option th:each="seccion : ${secciones}" th:value="${seccion.id}" th:text="${seccion.nombre}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card p-3">
                    <h3>Vehículos Estacionados</h3>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="vehiculo : ${vehiculosActivos}">
                            <span th:text="${vehiculo.placa}"></span>
                            <form th:action="@{'/salida/' + ${vehiculo.id}}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-warning btn-sm">Salida</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/historico" class="btn btn-info me-2">Ver Histórico</a>
            <a href="/logout" class="btn btn-danger">Salir</a>
        </div>
    </div>
</body>
</html>
