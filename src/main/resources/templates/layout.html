<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Modern UI Theme -->
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}">
    <!-- Estilos Globales -->
    <style>
        :root {
            --primary-blue: #0056b3;
            --dark-blue: #003366;
            --light-blue: #f0f7ff;
            --shadow: rgba(0, 86, 179, 0.15);
        }
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>

    <!-- Fragmento: Barra de Navegación -->
    <nav th:fragment="navbar(user)" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/home">
                <img th:src="@{/images/LOGO CUNDIPARK.png}" alt="Logo CundiPark" class="navbar-logo" 
                     onerror="this.nextElementSibling.style.display='inline'; this.style.display='none';">
                <i class="fas fa-parking me-2 text-warning" style="display:none;"></i>
                <span class="fw-bold">CundiPark</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" th:if="${user != null and (user.rol.name() == 'ADMIN' or user.rol.name() == 'SUPERADMIN')}">
                        <a class="nav-link" href="/admin/dashboard"><i class="fas fa-chart-line me-1"></i> Dashboard Admin</a>
                    </li>
                    <li class="nav-item" th:if="${user != null and (user.rol.name() == 'ADMIN' or user.rol.name() == 'SUPERADMIN')}">
                        <a class="nav-link" href="/superuser/dashboard"><i class="fas fa-users-cog me-1"></i> Gestión Usuarios</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center text-white gap-3">
                    <span th:if="${user != null}" class="d-none d-lg-block">
                        <i class="fas fa-user-circle me-1"></i> Hola, <strong th:text="${user.nombre}">Usuario</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-outline-light btn-sm px-3 rounded-pill">
                            <i class="fas fa-sign-out-alt me-1"></i> Salir
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Fragmento: Botones de Módulos (Navegación Usuario) -->
    <div th:fragment="module-buttons(active_module)" class="row mb-4 g-3">
        <div class="col-md-4">
            <a href="/home" class="btn w-100 p-3 shadow-sm d-flex align-items-center justify-content-center gap-2" 
               th:classappend="${active_module == 'vehiculo' ? 'btn-primary' : 'btn-white bg-white text-dark'}">
                <i class="fas fa-car fa-lg"></i> Mi Vehículo
            </a>
        </div>
        <div class="col-md-4">
            <a href="/disponibilidad" class="btn w-100 p-3 shadow-sm d-flex align-items-center justify-content-center gap-2" 
               th:classappend="${active_module == 'disponibilidad' ? 'btn-primary' : 'btn-white bg-white text-dark'}">
                <i class="fas fa-map-marked-alt fa-lg"></i> Disponibilidad
            </a>
        </div>
        <div class="col-md-4">
            <a href="/historico" class="btn w-100 p-3 shadow-sm d-flex align-items-center justify-content-center gap-2" 
               th:classappend="${active_module == 'historial' ? 'btn-primary' : 'btn-white bg-white text-dark'}">
                <i class="fas fa-history fa-lg"></i> Historial
            </a>
        </div>
    </div>

    <!-- Fragmento: Scripts del Footer -->
    <div th:fragment="footer-scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>
</html>
