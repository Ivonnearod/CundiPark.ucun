<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: header-css}"></div>
    <title>CundiPark - Auditoría</title>
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: var(--bs-dark);
        }
        .sidebar .nav-link.active {
            color: var(--bs-primary);
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
            <div class="position-sticky pt-3">
                <h4 class="text-center">CundiPark SuperUser</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/superuser/dashboard}">
                           <i class="fa fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/superuser/administradores}">
                            <i class="fa fa-user-shield me-2"></i>Administradores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/superuser/auditoria}">
                           <i class="fa fa-list-check me-2"></i>Auditoría
                        </a>
                    </li>
                </ul>
                <hr>
                <div class="px-3">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-danger w-100" type="submit">
                            <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Auditoría del Sistema</h1>
            </div>

            <div class="alert alert-info text-center">
                <h4 class="alert-heading"><i class="fas fa-cogs me-2"></i>Módulo en Construcción</h4>
                <p>Esta sección mostrará los registros de auditoría del sistema, como cambios de roles, eliminaciones de usuarios y otros eventos importantes.</p>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer-scripts}"></div>
</body>
</html>
