<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: header-css}"></div>
    <title>Iniciar Sesión - CundiPark</title>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="login-card auth-card card shadow">
        <div class="card-header text-center py-5 border-0 bg-transparent">
            <!-- Logo Principal -->
            <img th:src="@{/images/LOGO CUNDIPARK.png}" alt="CundiPark Logo" class="login-logo" 
                 onerror="this.nextElementSibling.style.display='block'; this.style.display='none';">
            <i class="fas fa-parking fa-4x mb-3 text-primary" style="display:none;"></i>
            
            <h2 class="fw-bold mt-2">CundiPark</h2>
            <p class="text-muted">Gestión Inteligente de Parqueadero</p>
        </div>
        <div class="card-body px-5 pb-5">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase">Correo Electrónico</label>
                    <!-- CAMBIO CRÍTICO: name="username" -> name="email" para coincidir con SecurityConfig -->
                    <input type="email" name="email" class="form-control" placeholder="nombre@udec.edu.co" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3 py-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Ingresar al Sistema
                </button>
            </form>

            <!-- Indicador de Ocupación Visual -->
            <div class="mt-4 p-3 rounded-4 bg-light border text-center">
                <div class="small text-muted mb-1">Ocupación Actual</div>
                <h4 th:class="${claseOcupacion}" th:text="${ocupacion + '%'}">0.0%</h4>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-muted mb-0 small">¿Nuevo en la plataforma? 
                    <a href="/registration" class="text-decoration-none fw-bold text-primary">Crea una cuenta aquí</a>
                </p>
            </div>
        </div>
    </div>
    <div th:replace="~{layout :: footer-scripts}"></div>
</body>
</html>
