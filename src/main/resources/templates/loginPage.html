<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CundiPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f4f6f9, #e9ecef);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .login-header {
            background: linear-gradient(45deg, #0d6efd, #0a58ca);
            color: white;
            padding: 30px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 700;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-login {
            background-color: #0d6efd;
            border: none;
            font-weight: 600;
            padding: 12px;
        }
        .btn-login:hover {
            background-color: #0a58ca;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2><i class="fas fa-parking me-2"></i>CundiPark</h2>
            <p class="mb-0 mt-2 opacity-75">Bienvenido de nuevo</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <!-- Alertas -->
            <div th:if="${param.error}" class="alert alert-danger"><i class="fas fa-times-circle me-2"></i>Usuario o contraseña incorrectos.</div>
            <div th:if="${param.logout}" class="alert alert-info"><i class="fas fa-info-circle me-2"></i>Has cerrado sesión exitosamente.</div>
            <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg" id="username" name="username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg btn-login">Iniciar Sesión</button>
                </div>
            </form>
            <hr class="my-4">
            <div class="text-center">
                <p>¿No tienes una cuenta? <a th:href="@{/registration}">Regístrate aquí</a></p>
                <div class="mt-3 alert alert-light border">
                    <small>Ocupación actual del parqueadero: <strong th:text="${ocupacion} + '%'">0.0%</strong></small>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
