<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: header-css}"></div>
    <title>Error - CundiPark</title>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Ha ocurrido un error</h4>
                    </div>
                    <div class="card-body text-center p-5">
                        <h1 class="display-1 text-danger fw-bold" th:text="${errorType != null ? errorType : 'Oops!'}">500</h1>
                        <h3 class="card-title mt-3">Algo salió mal</h3>
                        <p class="card-text text-muted mt-3" th:text="${errorMessage}">Error interno del servidor.</p>
                        
                        <div th:if="${stackTrace}" class="text-start mt-4">
                            <button class="btn btn-sm btn-outline-secondary mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#stackTraceDetails">
                                Ver detalles técnicos
                            </button>
                            <div class="collapse" id="stackTraceDetails">
                                <div class="card card-body bg-dark text-light small overflow-auto" style="max-height: 200px;">
                                    <pre th:text="${stackTrace}"></pre>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <a href="/home" class="btn btn-primary"><i class="fas fa-home me-2"></i>Volver al Inicio</a>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center" th:text="${errorTime}"></div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer-scripts}"></div>
</body>
</html>
