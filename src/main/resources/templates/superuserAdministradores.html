<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: header-css}"></div>
    <title>CundiPark - Gestión de Administradores</title>
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: var(--bs-dark);
        }
        .sidebar .nav-link.active {
            color: var(--bs-primary);
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
            <div class="position-sticky pt-3">
                <h4 class="text-center">CundiPark SuperUser</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/superuser/dashboard}">
                           <i class="fa fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/superuser/administradores}">
                            <i class="fa fa-user-shield me-2"></i>Administradores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/superuser/auditoria}">
                           <i class="fa fa-list-check me-2"></i>Auditoría
                        </a>
                    </li>
                </ul>
                <hr>
                <div class="px-3">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-danger w-100" type="submit">
                            <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Gestión de Administradores</h1>
            </div>

            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">Lista de Usuarios con Rol ADMIN</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Activo</th>
                                    <th>Fecha de Creación</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="admin : ${listaAdmins}">
                                    <td th:text="${admin.id}"></td>
                                    <td th:text="${admin.nombre}"></td>
                                    <td th:text="${admin.email}"></td>
                                    <td><span class="badge" th:classappend="${admin.activo} ? 'bg-success' : 'bg-secondary'" th:text="${admin.activo} ? 'Sí' : 'No'"></span></td>
                                    <td th:text="${#temporals.format(admin.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                                </tr>
                                <tr th:if="${listaAdmins == null or listaAdmins.isEmpty()}">
                                    <td colspan="5" class="text-center">No hay usuarios con el rol de Administrador.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer-scripts}"></div>
</body>
</html>
