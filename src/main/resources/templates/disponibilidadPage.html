<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: header-css}"></div>
    <title>Disponibilidad - CundiPark</title>
</head>
<body>

    <div th:replace="~{layout :: navbar(user=${user})}"></div>

    <div class="container mt-4">
        
        <!-- Botones de Módulos (Navegación) -->
        <div th:replace="~{layout :: module-buttons(active_module='disponibilidad')}"></div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-map-marked-alt me-2"></i>Estado de Bloques</h5>
                        <a href="/disponibilidad" class="btn btn-sm btn-outline-primary"><i class="fas fa-sync-alt me-1"></i>Actualizar</a>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <!-- Iterar sobre los bloques -->
                            <div class="col-md-6 col-lg-4" th:each="bloque : ${bloques}">
                                <div class="card h-100 text-center border-0 shadow-sm" style="transition: transform 0.2s;">
                                    <div class="card-body">
                                        <h4 class="card-title fw-bold text-secondary mb-3" th:text="${bloque.nombre}">Bloque A</h4>
                                        
                                        <!-- Indicador visual circular o barra -->
                                        <div class="mb-3">
                                            <h1 class="display-4 fw-bold" 
                                                th:classappend="${bloque.disponibles == 0 ? 'text-danger' : (bloque.disponibles < 5 ? 'text-warning' : 'text-success')}"
                                                th:text="${bloque.disponibles}">20</h1>
                                            <span class="text-muted text-uppercase small ls-1">Cupos Disponibles</span>
                                        </div>

                                        <div class="progress" style="height: 10px;">
                                            <div class="progress-bar" role="progressbar" 
                                                 th:style="'width: ' + ${(bloque.capacidad - bloque.disponibles) * 100.0 / bloque.capacidad} + '%'"
                                                 th:classappend="${bloque.disponibles == 0 ? 'bg-danger' : 'bg-primary'}"></div>
                                        </div>
                                        <div class="mt-2 text-muted small">Capacidad Total: <span th:text="${bloque.capacidad}"></span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer-scripts}"></div>
</body>
</html>
