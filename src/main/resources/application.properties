# ============================================================
# Spring Boot Application Configuration for CundiPark
# ============================================================

# ------------------------------
# Server Configuration
# ------------------------------
server.port=${PORT:8080}
# Context path (opcional, descomentar si se necesita)
# server.servlet.context-path=/api

# ------------------------------
# Database Configuration (MySQL / MariaDB con XAMPP)
# ------------------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
# Comentamos la línea de abajo para que Spring Boot detecte el driver automáticamente según la URL
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# H2 In-Memory Database (alternativa comentada)
# ------------------------------
# spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ------------------------------
# JPA / Hibernate Configuration
# ------------------------------
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dejar que Hibernate 6 detecte el dialecto automáticamente para MySQL 8+

# ------------------------------
# Initialization (para ejecutar data.sql si existe)
# ------------------------------
spring.jpa.defer-datasource-initialization=${DEFER_INIT:true}
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ------------------------------
# Logging (opcional, para ver más detalles)
# ------------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO
logging.level.com.grupo0.cundipark=DEBUG

# ------------------------------
# Jackson (para fechas y formato JSON)
# ------------------------------
spring.jackson.date-format=yyyy-MM-dd
spring.mvc.format.date=yyyy-MM-dd
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# ------------------------------
# Multipart (para subida de archivos, si se necesita)
# ------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ------------------------------
# Actuator (para monitoreo, opcional)
# ------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------
# Security / JWT Configuration
# ------------------------------
# En producción, esta clave DEBE ser configurada en el Dashboard de Render
jwt.secret=${JWT_SECRET:clave_secreta_temporal_para_desarrollo_local_12345}
jwt.expiration=86400000

# ------------------------------
# Performance / Production
# ------------------------------
spring.main.banner-mode=off
server.shutdown=graceful