# ============================================================
# Spring Boot Application Configuration for CundiPark
# ============================================================

# ------------------------------
# Server Configuration
# ------------------------------
server.port=8080
# Context path (opcional, descomentar si se necesita)
# server.servlet.context-path=/api

# ------------------------------
# Database Configuration (MySQL / MariaDB con XAMPP)
# ------------------------------
# Usando puerto 3307 (XAMPP) y base de datos 'parqueadero_db'
spring.datasource.url=jdbc:mysql://localhost:3307/parqueadero_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# H2 In-Memory Database (alternativa comentada)
# ------------------------------
# spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ------------------------------
# JPA / Hibernate Configuration
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ------------------------------
# Initialization (para ejecutar data.sql si existe)
# ------------------------------
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ------------------------------
# Logging (opcional, para ver más detalles)
# ------------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO
logging.level.com.grupo0.cundipark=DEBUG

# ------------------------------
# Jackson (para fechas y formato JSON)
# ------------------------------
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# ------------------------------
# Multipart (para subida de archivos, si se necesita)
# ------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ------------------------------
# Actuator (para monitoreo, opcional)
# ------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always