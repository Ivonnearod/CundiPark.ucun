<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Vehículo - CundiDiPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary-green: #006633;
            --dark-green: #004d26;
            --light-green: #e8f5e9;
            --shadow: rgba(0, 102, 51, 0.15);
        }
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, var(--light-green) 100%);
            min-height: 100vh;
            padding-top: 70px;
        }
        .navbar {
            background: linear-gradient(90deg, var(--primary-green), var(--dark-green));
            box-shadow: 0 2px 10px var(--shadow);
        }
        .logo {
            height: 45px;
            margin-right: 12px;
        }
        .consulta-card {
            max-width: 600px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow);
            border: none;
        }
        .card-header {
            background: var(--primary-green);
            color: white;
            padding: 1.8rem;
            text-align: center;
            font-weight: 600;
        }
        .card-body {
            padding: 2.5rem;
        }
        .result-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .btn-volver {
            background: var(--primary-green);
            border: none;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }
        .alert-result {
            border-radius: 10px;
            padding: 1.5rem;
        }
        @media (max-width: 576px) {
            .card-body { padding: 1.8rem; }
            .logo { height: 38px; }
        }
    </style>
</head>
<body>

    <!-- Navbar superior (consistente con otros páginas) -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/home}">
                <img th:src="@{/images/LOGO CUNDIPARK.png}" alt="CundiDiPark" class="logo">
                CundiDiPark
            </a>
            <div class="ms-auto">
                <span class="text-white me-3"><i class="fas fa-user me-1"></i> <span th:text="${user}"></span></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="consulta-card mt-5">

            <div class="card-header">
                <h3 class="mb-0">Consulta de Vehículo</h3>
                <small class="d-block mt-2 opacity-90">Placa buscada: <strong th:text="${placaBuscada}"></strong></small>
            </div>

            <div class="card-body text-center">

                <!-- Resultado encontrado -->
                <div th:if="${vehiculo != null}">
                    <i class="fas fa-check-circle result-icon text-success"></i>
                    <h4 class="text-success mb-4">Vehículo Encontrado - Estacionado</h4>
                    
                    <div class="alert alert-success alert-result">
                        <div class="row g-3">
                            <div class="col-6 text-start">
                                <strong>Bloque:</strong>
                                <p class="mb-0" th:text="${vehiculo.bloque?.nombre ?: 'No asignado'}"></p>
                            </div>
                            <div class="col-6 text-start">
                                <strong>Hora de ingreso:</strong>
                                <p class="mb-0" th:text="${#temporals.format(vehiculo.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- No encontrado -->
                <div th:if="${vehiculo == null}">
                    <i class="fas fa-exclamation-triangle result-icon text-warning"></i>
                    <h4 class="text-warning mb-3">No se encontró el vehículo</h4>
                    <div class="alert alert-warning alert-result">
                        <p class="mb-0">El vehículo con placa <strong th:text="${placaBuscada}"></strong> no está estacionado actualmente o ya salió.</p>
                    </div>
                </div>

                <!-- Botón volver -->
                <a th:href="@{/home}" class="btn btn-lg btn-volver text-white mt-4">
                    <i class="fas fa-arrow-left me-2"></i> Volver al Inicio
                </a>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
