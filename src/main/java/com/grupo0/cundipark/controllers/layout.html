<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Fragmento para los metadatos y CSS -->
    <div th:fragment="header-css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CundiPark</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <style>
            body {
                background-color: #f8f9fa;
            }
            .card-header {
                background-color: #e9ecef;
            }
        </style>
    </div>
</head>

<body>

    <!-- Fragmento de la Barra de Navegación Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar(user)">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home}"><i class="fas fa-parking me-2"></i>CundiPark</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text me-3" th:text="'¡Hola, ' + ${user.nombre} + '!'"></span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post">
                            <button class="btn btn-outline-light" type="submit">Cerrar Sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Fragmento de los Botones de Módulos -->
    <div class="container mt-4" th:fragment="module-buttons(active_module)">
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-4 border-bottom pb-3">
            <a th:href="@{/home}" class="btn" th:classappend="${active_module == 'vehiculo'} ? 'btn-primary' : 'btn-outline-primary'">
                <i class="fas fa-car me-1"></i> Mi Vehículo
            </a>
            <a th:href="@{/disponibilidad}" class="btn" th:classappend="${active_module == 'disponibilidad'} ? 'btn-primary' : 'btn-outline-primary'">
                <i class="fas fa-th-large me-1"></i> Disponibilidad
            </a>
            <a th:href="@{/historico}" class="btn" th:classappend="${active_module == 'historial'} ? 'btn-primary' : 'btn-outline-primary'">
                <i class="fas fa-history me-1"></i> Mi Historial
            </a>
        </div>
    </div>

    <!-- Fragmento para los scripts JS -->
    <div th:fragment="footer-scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>
</html>
