services:
  - type: web
    name: cundipark-api
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: cundipark-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: cundipark-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: cundipark-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: HIBERNATE_DDL
        value: update

databases:
  - name: cundipark-db
    databaseName: cundipark
    plan: free