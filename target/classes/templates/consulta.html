<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Vehículo - CundiPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Consulta de Vehículo</h1>
        <p class="text-center">Usuario: <strong th:text="${user}"></strong></p>

        <div class="card p-3">
            <h3>Resultado para placa: <span th:text="${placaBuscada}"></span></h3>
            <div th:if="${vehiculo != null}">
                <p><strong>Estado:</strong> Estacionado</p>
                <p><strong>Bloque:</strong> <span th:text="${vehiculo.bloque.nombre}"></span></p>
                <p><strong>Hora de ingreso:</strong> <span th:text="${#temporals.format(vehiculo.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
            </div>
            <div th:if="${vehiculo == null}">
                <p class="text-danger">Vehículo no encontrado o ya salió.</p>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/home" class="btn btn-primary">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
