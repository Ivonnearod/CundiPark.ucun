# --- Server Configuration ---
server.port=8080

# --- H2 In-Memory Database Configuration (Recommended for Development) ---
# This configuration uses an in-memory database, as described in your BACKEND_ARQUITECTURA.md
spring.datasource.url=jdbc:h2:mem:parqueadero_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console Configuration ---
# Enable H2 Console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# --- JPA/Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Initialization ---
# Ejecutar data.sql después de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true